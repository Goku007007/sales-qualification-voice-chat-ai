name: Follow-Up Job Runner

on:
  push:
    branches: [main]

jobs:
  run-followups:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Skip when DATABASE_URL is not configured
        if: ${{ env.DATABASE_URL == '' }}
        run: |
          echo "DATABASE_URL secret is not configured."
          echo "Skipping follow-up runner."
      - uses: actions/checkout@v4
        if: ${{ env.DATABASE_URL != '' }}
      - uses: actions/setup-node@v4
        if: ${{ env.DATABASE_URL != '' }}
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
        if: ${{ env.DATABASE_URL != '' }}
      - run: npx tsx scripts/run-followup-jobs.ts
        if: ${{ env.DATABASE_URL != '' }}
